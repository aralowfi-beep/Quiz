<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f7;
      color: #111;
    }
    .app {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
      text-align: center;
    }
    .timer {
      text-align: center;
      font-size: 1.35rem;
      margin: 12px 0 20px;
      font-weight: 600;
    }
    .question-box, .answer-box {
      min-height: 96px;
      padding: 18px;
      border-radius: 14px;
      background: #fafafa;
      border: 1px solid #e6e6e6;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.15rem;
      line-height: 1.5;
    }
    .answer-box {
      margin-top: 14px;
      min-height: 72px;
      color: #0a58ca;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    .controls.single {
      grid-template-columns: 1fr;
    }
    button {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: #111;
      color: #fff;
      width: 100%;
      touch-action: manipulation;
    }
    .status {
      text-align: center;
      margin-top: 16px;
      color: #666;
      font-size: 0.95rem;
    }
    .editor {
      margin-top: 26px;
      border-top: 1px solid #ececec;
      padding-top: 20px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      border-radius: 12px;
      border: 1px solid #d8d8d8;
      padding: 14px;
      font-size: 0.95rem;
      resize: vertical;
      font-family: Arial, sans-serif;
    }
    .hint {
      color: #666;
      font-size: 0.9rem;
      margin: 8px 0 12px;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Quiz App</h1>
    <div class="timer" id="timer">Time left: 01:00</div>
    <div class="question-box" id="questionBox">Tap "Next Question" to start.</div>
    <div class="answer-box" id="answerBox"></div>

    <div class="controls">
      <button type="button" onclick="revealAnswer()">Reveal Answer</button>
      <button type="button" onclick="nextQuestion()">Next Question</button>
    </div>

    <div class="controls single">
      <button type="button" onclick="restartQuiz()">Restart Quiz</button>
    </div>

    <div class="status" id="statusText">Questions remaining: 5</div>

    <div class="editor">
      <h2>Your Questions</h2>
      <div class="hint">
        Edit the questions below like this:<br>
        Question | Answer
      </div>
      <textarea id="questionsInput">What is the capital of France? | Paris
What is 5 + 7? | 12
Who wrote Romeo and Juliet? | William Shakespeare
What planet is known as the Red Planet? | Mars
What is the largest ocean on Earth? | Pacific Ocean</textarea>

      <div class="controls single">
        <button type="button" onclick="loadQuestions()">Load These Questions</button>
      </div>
    </div>
  </div>

  <script>
    var allQuestions = [];
    var remainingQuestions = [];
    var currentQuestion = null;
    var timer = 60;
    var intervalId = null;

    function el(id) {
      return document.getElementById(id);
    }

    function parseQuestions(text) {
      var lines = text.split('\n');
      var parsed = [];

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;

        var dividerIndex = line.indexOf('|');
        if (dividerIndex === -1) continue;

        var question = line.slice(0, dividerIndex).trim();
        var answer = line.slice(dividerIndex + 1).trim();

        if (question && answer) {
          parsed.push({ question: question, answer: answer });
        }
      }
      return parsed;
    }

    function formatTime(seconds) {
      var mins = Math.floor(seconds / 60);
      var secs = seconds % 60;
      return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    }

    function updateTimerDisplay() {
      el('timer').textContent = 'Time left: ' + formatTime(timer);
    }

    function stopTimer() {
      if (intervalId !== null) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function startTimer() {
      stopTimer();
      timer = 60;
      updateTimerDisplay();

      intervalId = setInterval(function () {
        timer -= 1;
        if (timer < 0) timer = 0;
        updateTimerDisplay();

        if (timer === 0) {
          stopTimer();
          alert("Time's up for this question.");
        }
      }, 1000);
    }

    function updateStatus() {
      el('statusText').textContent = 'Questions remaining: ' + remainingQuestions.length;
    }

    function nextQuestion() {
      if (remainingQuestions.length === 0) {
        currentQuestion = null;
        el('questionBox').textContent = 'No more questions left.';
        el('answerBox').textContent = '';
        stopTimer();
        timer = 0;
        updateTimerDisplay();
        updateStatus();
        return;
      }

      var randomIndex = Math.floor(Math.random() * remainingQuestions.length);
      currentQuestion = remainingQuestions.splice(randomIndex, 1)[0];
      el('questionBox').textContent = currentQuestion.question;
      el('answerBox').textContent = '';
      updateStatus();
      startTimer();
    }

    function revealAnswer() {
      if (!currentQuestion) return;
      el('answerBox').textContent = 'Answer: ' + currentQuestion.answer;
    }

    function restartQuiz() {
      remainingQuestions = allQuestions.slice();
      currentQuestion = null;
      stopTimer();
      timer = 60;
      updateTimerDisplay();
      el('questionBox').textContent = 'Tap "Next Question" to start.';
      el('answerBox').textContent = '';
      updateStatus();
    }

    function loadQuestions() {
      var parsed = parseQuestions(el('questionsInput').value);
      if (parsed.length === 0) {
        alert('Please enter at least one valid question in the format: Question | Answer');
        return;
      }

      allQuestions = parsed;
      restartQuiz();
      alert('Questions loaded successfully.');
    }

    window.onload = function () {
      allQuestions = parseQuestions(el('questionsInput').value);
      restartQuiz();
    };
  </script>
</body>
</html>
